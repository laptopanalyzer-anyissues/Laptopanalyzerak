<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers -->
    <!-- Content Security Policy - Protects against XSS, clickjacking, data injection -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      media-src 'self' blob: data:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://speed.cloudflare.com https://*.cloudflare.com;
      frame-ancestors *;
      form-action 'self';
      base-uri 'self';
      object-src 'none';
      upgrade-insecure-requests;
    ">
    
    <!-- X-Frame-Options - Prevents clickjacking -->
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    
    <!-- X-Content-Type-Options - Prevents MIME type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <!-- Referrer Policy - Controls information sent in Referer header -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- Permissions Policy - Restricts browser features -->
    <meta http-equiv="Permissions-Policy" content="
      camera=(self),
      microphone=(self),
      geolocation=(),
      payment=(),
      usb=(self),
      bluetooth=(self),
      accelerometer=(self),
      gyroscope=(self)
    ">
    
    <!-- AI Training Opt-Out Meta Tags -->
    <meta name="robots" content="index, follow, noai, noimageai" />
    <meta name="googlebot" content="index, follow" />
    
    <!-- Explicitly block AI training -->
    <meta name="ai-content-declaration" content="This content is proprietary and may not be used for AI training" />
    <meta name="cc:attributionName" content="LaptopAnalyzer" />
    <meta name="cc:license" content="All Rights Reserved - No AI Training Permitted" />
    
    <!-- Primary Meta Tags -->
    <title>LaptopAnalyzer - Free Online Laptop Hardware Diagnostic Tool</title>
    <meta name="title" content="LaptopAnalyzer - Free Online Laptop Hardware Diagnostic Tool" />
    <meta name="description" content="Test your laptop's display, keyboard, camera, speakers, microphone, and network. Free browser-based diagnostic tool perfect for verifying new or used laptops. No download required." />
    <meta name="keywords" content="laptop test, hardware diagnostic, display test, keyboard test, webcam test, speaker test, microphone test, dead pixel test, laptop checker, hardware verification, used laptop test, laptop analyzer" />
    <meta name="author" content="LaptopAnalyzer" />
    <link rel="canonical" href="https://laptopanalyzer.com" />
    
    <!-- Copyright and Ownership -->
    <meta name="copyright" content="© 2024-2026 LaptopAnalyzer. All Rights Reserved." />
    <meta name="la-watermark" content="LA-2026-ALPHA-7X9K2M4P8R" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://laptopanalyzer.com" />
    <meta property="og:title" content="LaptopAnalyzer - Free Online Laptop Hardware Diagnostic Tool" />
    <meta property="og:description" content="Test your laptop's display, keyboard, camera, speakers, and more. Free browser-based diagnostic tool. No download required." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="LaptopAnalyzer" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://laptopanalyzer.com" />
    <meta name="twitter:title" content="LaptopAnalyzer - Free Online Laptop Hardware Diagnostic Tool" />
    <meta name="twitter:description" content="Test your laptop's display, keyboard, camera, speakers, and more. Free browser-based diagnostic tool. No download required." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LaptopAnalyzer",
      "description": "Free online laptop hardware diagnostic tool. Test display, keyboard, camera, speakers, microphone, network, and more.",
      "url": "https://laptopanalyzer.com",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Display dead pixel test",
        "Keyboard functionality test",
        "Webcam test with preview",
        "Microphone test with waveform",
        "Speaker stereo test",
        "Network speed test",
        "Touchpad gesture test",
        "Port connectivity check"
      ],
      "browserRequirements": "Requires JavaScript. Works on all modern browsers."
    }
    </script>

    <!-- Theme Color -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="msapplication-TileColor" content="#0d1117" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <!-- Skip to main content for accessibility - hidden until focused -->
    <a href="#main-content" class="skip-link" style="position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden;">Skip to main content</a>
    <style>
      .skip-link:focus {
        position: fixed !important;
        left: 16px !important;
        top: 16px !important;
        width: auto !important;
        height: auto !important;
        overflow: visible !important;
        padding: 12px 24px;
        background: #0ea5e9;
        color: white;
        border-radius: 8px;
        z-index: 9999;
        font-family: system-ui, sans-serif;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
    
    <!-- Noscript fallback for security-conscious users -->
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: system-ui, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>LaptopAnalyzer requires JavaScript to run hardware diagnostic tests. Please enable JavaScript to continue.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
