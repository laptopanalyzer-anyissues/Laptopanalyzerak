<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers -->
    <!-- Content Security Policy - Protects against XSS, clickjacking, data injection -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.gpteng.co;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https:;
      media-src 'self' blob: data:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://speed.cloudflare.com https://*.cloudflare.com;
      frame-ancestors 'self' https://*.lovable.app https://*.lovable.dev https://lovable.dev https://*.lovableproject.com;
      form-action 'self';
      base-uri 'self';
      object-src 'none';
      upgrade-insecure-requests;
    ">
    
    <!-- X-Frame-Options - Prevents clickjacking -->
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    
    <!-- X-Content-Type-Options - Prevents MIME type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <!-- Referrer Policy - Controls information sent in Referer header -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- Permissions Policy - Restricts browser features -->
    <meta http-equiv="Permissions-Policy" content="
      camera=(self),
      microphone=(self),
      geolocation=(),
      payment=(),
      usb=(self),
      bluetooth=(self),
      accelerometer=(self),
      gyroscope=(self)
    ">
    
    <!-- Primary Meta Tags -->
    <title>LaptopCheck - Free Online Laptop Hardware Diagnostic Tool</title>
    <meta name="title" content="LaptopCheck - Free Online Laptop Hardware Diagnostic Tool" />
    <meta name="description" content="Test your laptop's display, keyboard, camera, speakers, microphone, and network. Free browser-based diagnostic tool perfect for verifying new or used laptops. No download required." />
    <meta name="keywords" content="laptop test, hardware diagnostic, display test, keyboard test, webcam test, speaker test, microphone test, dead pixel test, laptop checker, hardware verification, used laptop test" />
    <meta name="author" content="LaptopCheck" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://laptopcheck.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://laptopcheck.app" />
    <meta property="og:title" content="LaptopCheck - Free Online Laptop Hardware Diagnostic Tool" />
    <meta property="og:description" content="Test your laptop's display, keyboard, camera, speakers, and more. Free browser-based diagnostic tool. No download required." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="LaptopCheck" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://laptopcheck.app" />
    <meta name="twitter:title" content="LaptopCheck - Free Online Laptop Hardware Diagnostic Tool" />
    <meta name="twitter:description" content="Test your laptop's display, keyboard, camera, speakers, and more. Free browser-based diagnostic tool. No download required." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LaptopCheck",
      "description": "Free online laptop hardware diagnostic tool. Test display, keyboard, camera, speakers, microphone, network, and more.",
      "url": "https://laptopcheck.app",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Display dead pixel test",
        "Keyboard functionality test",
        "Webcam test with preview",
        "Microphone test with waveform",
        "Speaker stereo test",
        "Network speed test",
        "Touchpad gesture test",
        "Port connectivity check"
      ],
      "browserRequirements": "Requires JavaScript. Works on all modern browsers."
    }
    </script>

    <!-- Theme Color -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="msapplication-TileColor" content="#0d1117" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <!-- Noscript fallback for security-conscious users -->
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: system-ui, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>LaptopCheck requires JavaScript to run hardware diagnostic tests. Please enable JavaScript to continue.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
